[graph]
targets = []
all-features = true

[advisories]
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # quick-xml < 0.41 DoS advisories (quadratic duplicate-attribute check,
    # unbounded namespace allocation). Our only quick-xml consumer is
    # wayland-scanner, a build-time proc-macro that parses the trusted Wayland
    # protocol XML bundled in the crates — no untrusted XML is parsed at
    # runtime. Remove once wayland-scanner allows quick-xml >= 0.41.
    { id = "RUSTSEC-2026-0194", reason = "build-time only; parses trusted bundled protocol XML" },
    { id = "RUSTSEC-2026-0195", reason = "build-time only; parses trusted bundled protocol XML" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "BSL-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "IJG",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
