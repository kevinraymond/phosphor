name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  demos:
    name: Capture demo presets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Every way a demo preset can be wrong is silent at runtime — an unknown param is
      # dropped without a log line, a missing obstacle image logs nothing at all — so a
      # rename here surfaces as a capture run that quietly films the wrong thing.
      - run: scripts/capture/check_demos.py

  deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deny check
        uses: EmbarkStudios/cargo-deny-action@v2

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libclang-dev
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (video feature)
        run: cargo clippy --all-targets --features video -- -D warnings
      - name: Clippy (webcam feature)
        run: cargo clippy --all-targets --features webcam -- -D warnings
      - name: Clippy (depth feature)
        run: cargo clippy --all-targets --features depth -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libclang-dev
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test
      - name: Test (video feature)
        run: cargo test --features video
      - name: Test (webcam feature)
        run: cargo test --features webcam
      - name: Test (depth feature)
        run: cargo test --features depth

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: macOS arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - name: macOS x86_64
            os: macos-latest
            target: x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libclang-dev
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.target }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.target }}-v2
      # Clippy per native target so cfg-gated Windows/macOS code is actually linted
      # (the host-only lint job and pre-commit hook never see it). See board #1500.
      - name: Clippy (cross-target)
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --target ${{ matrix.target }} --features "video,webcam,ndi" -- -D warnings
      - name: Build
        run: cargo build --target ${{ matrix.target }}
      - name: Build (video feature)
        run: cargo build --target ${{ matrix.target }} --features video
      - name: Build (webcam feature)
        run: cargo build --target ${{ matrix.target }} --features webcam
      - name: Build (depth feature)
        run: cargo build --target ${{ matrix.target }} --features depth
      - name: Build (all features)
        run: cargo build --target ${{ matrix.target }} --features "video,webcam,ndi"

      - name: Stage artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/debug/phosphor-app staging/
          cp -r assets staging/
      - name: Stage artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/debug/phosphor-app staging/
          cp -r assets staging/
      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir staging
          copy target\${{ matrix.target }}\debug\phosphor-app.exe staging\
          xcopy assets staging\assets\ /E /I /Q
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fosfora-ci-${{ matrix.target }}
          path: staging/
          retention-days: 7

  tag-release:
    name: Tag release if version changed
    needs: [fmt, deny, lint, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      # Gate the tag on the CHANGELOG, because release.yml extracts the release body by
      # awk-matching '## vX.Y.Z' and publishes an empty one if that header is missing.
      # Twice now (v1.11.0, v1.13.0) it was. No tag means no release, so this fails in the
      # one place where the mistake is still cheap to fix. It cannot live in a normal CI
      # job: paths-ignore skips '**.md', so a CHANGELOG-only push never reaches one.
      - name: Check CHANGELOG
        run: scripts/check_changelog.py

      # Same reasoning for the docs: paths-ignore means nothing else in CI ever runs this,
      # so a stale effect count or a broken relative link rides out to a release unnoticed.
      # Catch-22 (hit shipping v1.17.0 — Chromatica shipped without gallery/count updates):
      # when this guard fails, a docs-ONLY fix is itself skipped by paths-ignore and never
      # re-runs the job, so the tag stays stuck. Bundle the doc fix with a non-'**.md' change
      # (a version bump, or an edit to this file) to retrigger. Proper fix would be to move
      # tag-release to its own workflow keyed on Cargo.toml/CHANGELOG/docs paths.
      - name: Check docs
        run: scripts/check_docs.py

      - name: Check version and tag
        run: |
          # Read version from Cargo.toml
          VERSION=$(grep '^version' crates/phosphor-app/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="v${VERSION}"
          echo "Cargo.toml version: ${VERSION} (tag: ${TAG})"

          # Check if this tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping"
          else
            echo "New version detected — creating tag ${TAG}"
            git tag "$TAG"
            git push origin "$TAG"
          fi
