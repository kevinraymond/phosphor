name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What would you like added or changed?
      placeholder: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why would this be useful? What workflow does it enable?
      placeholder: |
        I'm a VJ who performs at clubs and I need...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or other approaches you've tried?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, references, links, or anything else.
